# Token Health Check — composite action
#
# Usage:
#   - uses: ./.github/actions/check-token-health
#     with:
#       token: ${{ secrets.RENOVATE_TOKEN }}
#       token_name: RENOVATE_TOKEN
#       required_scopes: repo,workflow
#
# Fails fast if a token is expired, revoked, or missing required scopes.
# Run at the start of workflows that depend on PATs or App tokens.

name: Check Token Health
description: |
  Verifies a GitHub token is valid, not expired, and has required scopes.
  Fails the step immediately if the token is unhealthy, preventing
  cascading failures deeper in the workflow.

inputs:
  token:
    description: 'The GitHub token to validate'
    required: true
  token_name:
    description: 'Human-readable name for error messages (e.g., RENOVATE_TOKEN)'
    required: true
  required_scopes:
    description: 'Comma-separated list of required OAuth scopes (empty = any valid token)'
    required: false
    default: ''
  min_remaining_requests:
    description: 'Minimum API requests remaining before warning'
    required: false
    default: '100'

outputs:
  valid:
    description: 'Whether the token is valid (true/false)'
    value: ${{ steps.check.outputs.valid }}
  rate_remaining:
    description: 'API rate limit remaining'
    value: ${{ steps.check.outputs.rate_remaining }}
  expires_at:
    description: 'Token expiry (if detectable)'
    value: ${{ steps.check.outputs.expires_at }}

runs:
  using: composite
  steps:
    - name: Validate token
      id: check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TOKEN_NAME: ${{ inputs.token_name }}
        REQUIRED_SCOPES: ${{ inputs.required_scopes }}
        MIN_REMAINING: ${{ inputs.min_remaining_requests }}
      run: bash "${{ github.action_path }}/check_token_health.sh"
