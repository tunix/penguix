name: Cleanup Old Images
on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

jobs:
  delete-older-than-90:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Cleanup old images
        uses: projectbluefin/actions/bootc-build/ghcr-cleanup@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          # IMPORTANT: Update this to match your image name from Containerfile (# Name: comment)
          # This should match the "# Name: your-repo-name" comment in your Containerfile
          # Example: If your Containerfile has "# Name: my-custom-os", use "my-custom-os" here
          packages: finpilot
          older-than: 90 days
          keep-n-tagged: 7
          keep-n-untagged: 7
          github-token: ${{ secrets.GITHUB_TOKEN }}
