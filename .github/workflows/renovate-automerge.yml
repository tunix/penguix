name: Renovate Auto-merge

# Auto-merge Renovate PRs after PR validation succeeds.
# This workflow runs on the completion of PR Validation to automatically
# merge low-risk dependency updates (digest bumps, SHA pins, etc.).

on:
  workflow_run:
    workflows: ["PR Validation"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: github.event.workflow_run.conclusion == 'success'
    uses: projectbluefin/actions/.github/workflows/reusable-renovate-automerge.yml@fcd2a6bac15f2037df2e62572eef7a70fd25759f # v1
    with:
      head_sha: ${{ github.event.workflow_run.head_sha }}
      base_branch: main
