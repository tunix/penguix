---
name: Build and Push Image
on:
  pull_request:
    branches:
      - main
    paths:
      - Containerfile
      - Justfile
      - image-versions.yml
      - build/**
      - custom/**
      - iso/**
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".github/workflows/*validate*.yml"
  schedule:
    - cron: '05 10 * * *'  # 10:05am UTC everyday
  workflow_dispatch:

permissions: {}

env:
  IMAGE_DESC: "My Customized Universal Blue Image"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "stable"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup runner
        uses: projectbluefin/actions/bootc-build/setup-runner@v1
        with:
          storage-backend: btrfs
          update-podman: "true"
          install-tools: '["just"]'

      - name: Install yq
        shell: bash
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Restore DNF cache
        id: dnf-cache-restore
        uses: projectbluefin/actions/bootc-build/dnf-cache@v1
        with:
          action: restore
          cache-name: ${{ env.IMAGE_NAME }}

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${{ env.DEFAULT_TAG }}-$(date +%Y%m%d)"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Generate default tag
        id: default-tag
        shell: bash
        run: |
          DEFAULT_TAG=$(just generate-default-tag "${{ env.DEFAULT_TAG }}")
          echo "default_tag=${DEFAULT_TAG}" >> $GITHUB_OUTPUT
          echo "Default tag: ${DEFAULT_TAG}"

      - name: Generate tags
        id: generate-tags
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          alias_tags=$(just generate-build-tags \
            "${{ env.DEFAULT_TAG }}" \
            "${{ steps.version.outputs.version }}" \
            "${GITHUB_EVENT_NAME}" \
            "${PR_NUMBER}")

          echo "Tags: ${alias_tags}"
          echo "alias_tags=${alias_tags}" >> $GITHUB_OUTPUT

      - name: Build image
        id: build-image
        uses: nick-fields/retry@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 300
          command: |
            sudo "$(command -v just)" build "${IMAGE_NAME}" "${DEFAULT_TAG}"

      - name: Tag images
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          ALIAS_TAGS: ${{ steps.generate-tags.outputs.alias_tags }}
        run: |
          sudo -E "$(command -v just)" tag-images "${IMAGE_NAME}" \
                          "${DEFAULT_TAG}" \
                          "${ALIAS_TAGS}"

      - name: Save DNF cache
        if: always() && !cancelled()
        uses: projectbluefin/actions/bootc-build/dnf-cache@v1
        with:
          action: save
          cache-name: ${{ env.IMAGE_NAME }}
          allow-write: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}

      # OPTIONAL: Rechunking (OCI-native, no rpm-ostree)
      # Rechunking improves OTA delta performance by reorganizing layers.
      # Uncomment to enable. See: projectbluefin/actions/bootc-build/chunka
      # - name: Rechunk image
      #   if: github.event_name != 'pull_request'
      #   uses: projectbluefin/actions/bootc-build/chunka@v1
      #   with:
      #     source-image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
      #     max-layers: 128

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        uses: projectbluefin/actions/bootc-build/push-image@v1
        with:
          image-name: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.generate-tags.outputs.alias_tags }}
          default-tag: ${{ steps.default-tag.outputs.default_tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # OPTIONAL: Sign, publish SBOM, and attest (SLSA Build L2 provenance)
      # Bluefin pattern: keyless OIDC signing via Fulcio + SBOM attestation via ORAS.
      # Uncomment to enable. Requires 'id-token: write' permission (already granted).
      # Non-fatal — signing/SBOM failures never block image publishing.

      # - name: Sign and publish
      #   if: github.event_name != 'pull_request'
      #   continue-on-error: true
      #   uses: projectbluefin/actions/bootc-build/sign-and-publish@v1
      #   with:
      #     image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
      #     digest: ${{ steps.push.outputs.digest }}
      #     signing-mode: keyless
      #     generate-sbom: true
      #     push-attestation: true
      #     github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Export image to OCI dir (PR only)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          mkdir -p "${IMAGE_NAME}_build"
          sudo podman save --format oci-dir -o "${IMAGE_NAME}_build" "${IMAGE_NAME}:${DEFAULT_TAG}"

      - name: Upload OCI dir as artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-build
          path: ${{ env.IMAGE_NAME }}_build
          if-no-files-found: warn
          retention-days: 1

      - name: PR testing instructions
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "### Test this PR build"
            echo ""
            echo "Download the \`.oci\` artifact, unzip it, then:"
            echo '```bash'
            echo "sudo bootc switch --transport oci /absolute/path/to/${{ env.IMAGE_NAME }}_build"
            echo '```'
            echo "To go back:"
            echo '```bash'
            echo "sudo bootc switch ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build telemetry summary
        if: always()
        shell: bash
        run: |
          IMAGE_SIZE=$(sudo podman image inspect "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{.Size}}' 2>/dev/null || echo "0")
          IMAGE_SIZE_MB=$(( IMAGE_SIZE / 1024 / 1024 ))
          LAYER_COUNT=$(sudo podman image inspect "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{len .RootFS.Layers}}' 2>/dev/null || echo "?")

          {
            echo "## Build Telemetry: ${{ env.IMAGE_NAME }}"
            echo ""
            echo "**Image size (uncompressed):** ${IMAGE_SIZE_MB} MB"
            echo "**Layer count:** ${LAYER_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"
