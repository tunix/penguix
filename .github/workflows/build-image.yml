---
name: Build and Push Image

# PR builds are disabled by default to save CI minutes. To enable them, add:
#   pull_request:
#     branches:
#       - main
#     paths-ignore:
#       - "**.md"
#       - ".github/workflows/*validate*.yml"
on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".github/workflows/*validate*.yml"
  schedule:
    - cron: "05 10 * * *" # 10:05am UTC everyday
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_VENDOR: "${{ github.repository_owner }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  IMAGE_DESC: "My Customized Universal Blue Image"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  DEFAULT_TAG: "stable"
  REGISTRY_CACHE_WRITE: ${{ github.event_name != 'pull_request' && '1' || '0' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Preflight
        id: preflight
        uses: projectbluefin/actions/bootc-build/preflight@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          registry: ghcr.io
          github-token: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}

      - name: Setup runner
        uses: projectbluefin/actions/bootc-build/setup-runner@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          storage-backend: btrfs
          update-podman: "true"
          install-tools: '["just"]'

      - name: Restore DNF cache
        id: dnf-cache-restore
        uses: projectbluefin/actions/bootc-build/dnf-cache@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          action: restore
          cache-name: ${{ env.IMAGE_NAME }}
          cache-bust: ${{ hashFiles('**/Containerfile') }}

      - name: Detect changes
        id: detect-changes
        uses: projectbluefin/actions/bootc-build/detect-changes@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          filters: |
            image:
              - 'Containerfile'
              - 'build/**'
              - 'custom/**'
              - 'Justfile'

      - name: Build image
        if: steps.detect-changes.outputs.should_build == 'true' || github.event_name != 'pull_request'
        id: build-image
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_VENDOR: ${{ env.IMAGE_VENDOR }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
          REGISTRY_CACHE_WRITE: ${{ env.REGISTRY_CACHE_WRITE }}
        with:
          timeout_minutes: 120
          max_attempts: 3
          retry_wait_seconds: 300
          command: |
            sudo -E "$(command -v just)" build "${IMAGE_NAME}" "${DEFAULT_TAG}"

      - name: Get version label
        if: steps.detect-changes.outputs.should_build == 'true' || github.event_name != 'pull_request'
        id: version
        shell: bash
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          DEFAULT_TAG: ${{ env.DEFAULT_TAG }}
        run: |
          VERSION_LABEL=$(sudo podman inspect "localhost/${IMAGE_NAME}:${DEFAULT_TAG}" \
            --format '{{index .Config.Labels "org.opencontainers.image.version"}}')
          echo "version=${VERSION_LABEL}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_LABEL}"

      - name: Generate tags
        if: steps.detect-changes.outputs.should_build == 'true' || github.event_name != 'pull_request'
        id: generate-tags
        uses: projectbluefin/actions/bootc-build/generate-tags@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          base-name: ${{ env.IMAGE_NAME }}
          stream-name: ${{ env.DEFAULT_TAG }}
          version-label: ${{ steps.version.outputs.version }}
          event-name: ${{ github.event_name }}
          pr-number: ${{ github.event.number }}

      - name: Save DNF cache
        if: always() && !cancelled() && github.event_name != 'pull_request'
        uses: projectbluefin/actions/bootc-build/dnf-cache@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          action: save
          cache-name: ${{ env.IMAGE_NAME }}
          allow-write: ${{ github.event_name != 'pull_request' && 'true' || 'false' }}
          cache-bust: ${{ hashFiles('**/Containerfile') }}

      # OPTIONAL: Rechunking (OCI-native, no rpm-ostree)
      # Rechunking improves OTA delta performance by reorganizing layers.
      # Uncomment the step below to enable it. Renovate will keep the action
      # pinned and up to date automatically once it is uncommented.
      #
      # For optimal layer grouping (packages sorted by update cadence), also add
      # the bootc-build/apply-pkg-intervals step before rechunking and create a
      # .github/workflows/pkg-cadence.yml workflow. See:
      #   https://github.com/projectbluefin/actions/tree/main/bootc-build/chunka
      #   https://github.com/projectbluefin/actions/tree/main/bootc-build/apply-pkg-intervals
      # - name: Rechunk image
      #   if: github.event_name != 'pull_request'
      #   id: rechunk-image
      #   uses: projectbluefin/actions/bootc-build/chunka@6231015b336556d2ff0adc1d1e59514bf19dcb42 # v1
      #   with:
      #     source-image: localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
      #     max-layers: 128

      - name: Tag images
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          ALIAS_TAGS: ${{ steps.generate-tags.outputs.tags }}
        run: |
          sudo -E "$(command -v just)" tag-images "${IMAGE_NAME}" \
                          "${DEFAULT_TAG}" \
                          "${ALIAS_TAGS}"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        uses: projectbluefin/actions/bootc-build/push-image@d8f871c0ca7a868339d3c175200a7319492473c7 # v1
        with:
          image-name: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.generate-tags.outputs.tags }}
          default-tag: ${{ steps.generate-tags.outputs.default-tag }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # OPTIONAL: Sign and attest (SLSA Build L2 provenance)
      # Bluefin pattern: keyless OIDC signing via Fulcio.
      # Uncomment to enable. Requires 'id-token: write' permission (already granted).
      # Non-fatal — signing failures never block image publishing.

      # - name: Sign and publish
      #   if: github.event_name != 'pull_request'
      #   continue-on-error: true
      #   uses: projectbluefin/actions/bootc-build/sign-and-publish@6231015b336556d2ff0adc1d1e59514bf19dcb42 # v1
      #   with:
      #     image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
      #     digest: ${{ steps.push.outputs.digest }}
      #     signing-mode: keyless
      #     generate-sbom: false
      #     push-attestation: true
      #     certificate-identity-regexp: https://github.com/${{ github.repository }}/.github/workflows/
      #     github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build telemetry summary
        if: steps.detect-changes.outputs.should_build == 'true' || github.event_name != 'pull_request'
        shell: bash
        run: |
          IMAGE_SIZE=$(sudo podman image inspect "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{.Size}}' 2>/dev/null || echo "0")
          IMAGE_SIZE_MB=$(( IMAGE_SIZE / 1024 / 1024 ))
          LAYER_COUNT=$(sudo podman image inspect "localhost/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}" \
            --format '{{len .RootFS.Layers}}' 2>/dev/null || echo "?")

          {
            echo "## Build Telemetry: ${{ env.IMAGE_NAME }}"
            echo ""
            echo "**Image size (uncompressed):** ${IMAGE_SIZE_MB} MB"
            echo "**Layer count:** ${LAYER_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"
