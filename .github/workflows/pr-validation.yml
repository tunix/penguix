name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate
        uses: projectbluefin/actions/bootc-build/validate-pr@e5f98fdff133bf56c66ca40dc54187b481b2c9b0 # v1
        with:
          shellcheck-glob: "build/*.sh"
          dockerfile: "Containerfile"
          hadolint-config: ".hadolint.yaml"
