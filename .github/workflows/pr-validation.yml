name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate
        uses: projectbluefin/actions/bootc-build/validate-pr@74c4356b36dd94c0eadf15bbe63a26b58a0e7468 # v1
        with:
          shellcheck-glob: "build/*.sh"
          dockerfile: "Containerfile"
          hadolint-config: ".hadolint.yaml"
