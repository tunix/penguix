name: Validate Renovate Config

on:
  pull_request:
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yml"
      - ".github/workflows/validate-renovate.yml"
  push:
    branches:
      - main
    paths:
      - "renovate.json"
      - ".github/workflows/renovate.yml"
      - ".github/workflows/validate-renovate.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@a0878d8a5ad5ce0c0553e8e6c0fae2f4a5964074 # v6
        with:
          node-version: latest

      - run: npm install -g renovate@latest

      - run: renovate-config-validator renovate.json
